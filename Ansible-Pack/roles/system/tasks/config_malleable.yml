---
- name: Find malleable.profile under /opt
  find:
    paths: "/opt"
    patterns: "malleable.profile"
    recurse: yes
  register: malleable_profile_search

- name: Fail if malleable.profile was not found
  fail:
    msg: "malleable.profile not found under /opt"
  when: malleable_profile_search.files | length == 0

- name: Read custom header from controller environment
  ansible.builtin.set_fact:
    custom_header: "{{ lookup('env', 'CUSTOM_HEADER') }}"
    custom_secret: "{{ lookup('env', 'CUSTOM_SECRET') }}"

- name: Fail if CUSTOM_HEADER or CUSTOM_SECRET is missing
  ansible.builtin.fail:
    msg: "CUSTOM_HEADER and/or CUSTOM_SECRET are not set in the environment running Ansible"
  when: custom_header | length == 0 or custom_secret | length == 0

- name: Inject custom header after every '# header this test' with blank line
  ansible.builtin.replace:
    path: "{{ malleable_profile_search.files[0].path }}"
    regexp: '(^\s*# header this test\s*$)'
    replace: '\1header "{{ custom_header }}" "{{ custom_secret }}";\n'
  when: malleable_profile_search.files | length > 0

- name: Read keystore values from controller environment
  ansible.builtin.set_fact:
    keystore_filename: "{{ lookup('env', 'KEYSTORE_FILENAME') }}"
    keystore_password: "{{ lookup('env', 'KEYSTORE_PASSWORD') }}"

- name: Fail if KEYSTORE_FILENAME or KEYSTORE_PASSWORD is missing
  ansible.builtin.fail:
    msg: "KEYSTORE_FILENAME and KEYSTORE_PASSWORD must be exported before running ansible-playbook"
  when: keystore_filename | length == 0 or keystore_password | length == 0

- name: Replace keystore filename placeholder
  ansible.builtin.replace:
    path: "{{ malleable_profile_search.files[0].path }}"
    regexp: '<nickvourd\.store>'
    replace: "{{ keystore_filename }}.store"
  when: malleable_profile_search.files | length > 0

- name: Replace keystore password placeholder
  ansible.builtin.replace:
    path: "{{ malleable_profile_search.files[0].path }}"
    regexp: '<keystore_password>'
    replace: "{{ keystore_password }}"
  when: malleable_profile_search.files | length > 0
