---
# cobalt_strike.yml
# Included by main.yml only when local_cs_path is defined (i.e. --local-cs flag was passed).
# Variables expected:
#   local_cs_path  - absolute local path to cobaltstrike-dist-linux.tgz
#   remote_cs_dir  - remote destination directory (default: /opt)

- name: Ensure Cobalt Strike install directory exists
  file:
    path: "{{ remote_cs_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Copy Cobalt Strike archive to remote host
  copy:
    src: "{{ local_cs_path }}"
    dest: "{{ remote_cs_dir }}/cobaltstrike-dist-linux.tgz"
    owner: root
    group: root
    mode: '0644'

- name: Extract Cobalt Strike archive
  unarchive:
    src: "{{ remote_cs_dir }}/cobaltstrike-dist-linux.tgz"
    dest: "{{ remote_cs_dir }}"
    remote_src: yes
    owner: root
    group: root

- name: Remove Cobalt Strike archive after extraction
  file:
    path: "{{ remote_cs_dir }}/cobaltstrike-dist-linux.tgz"
    state: absent
